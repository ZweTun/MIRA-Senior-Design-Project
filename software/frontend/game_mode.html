<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MIRA - Games</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
	<style>
		:root {
			--page-bg: #0b0e13;
			--panel-bg: #141925;
			--panel-border: rgba(255,255,255,0.12);
			--text-main: #f3f6ff;
			--text-sub: #b6bfd0;
			--focus-ring: rgba(155,92,255,0.7);
			--accent: #9b5cff;
			--accent-strong: #c7a7ff;
			--shadow-soft: 0 18px 38px rgba(0,0,0,0.45);
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			background:
				radial-gradient(circle at top left, rgba(155,92,255,0.18), transparent 34%),
				radial-gradient(circle at top right, rgba(38,166,181,0.12), transparent 30%),
				var(--page-bg);
			color: var(--text-main);
			font-family: 'DM Mono', monospace;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 28px 18px 40px;
		}

		.page-shell {
			width: min(1180px, 100%);
		}

		.topbar {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-bottom: 12px;
		}

		.back-button {
			appearance: none;
			border: 1px solid rgba(255,255,255,0.12);
			background: rgba(255,255,255,0.03);
			color: var(--text-main);
			width: 48px;
			height: 48px;
			cursor: pointer;
			border-radius: 10px;
			display: grid;
			place-items: center;
			transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
		}

		.back-button svg {
			width: 24px;
			height: 24px;
			stroke: currentColor;
			stroke-width: 2.2;
			fill: none;
		}

		.back-button:hover,
		.back-button:focus-visible {
			transform: translateX(-2px);
			background: rgba(255,255,255,0.08);
			border-color: rgba(255,255,255,0.24);
			outline: none;
		}

		.back-button:focus-visible {
			box-shadow: 0 0 0 3px var(--focus-ring);
		}

		.hero {
			padding: 18px 0 28px;
			text-align: center;
		}

		.hero h1 {
			margin: 0;
			font-family: 'Syne', sans-serif;
			font-size: clamp(54px, 8vw, 78px);
			line-height: 1;
			letter-spacing: -0.03em;
			color: #ffffff;
		}

		.hero p {
			margin: 14px auto 0;
			max-width: 680px;
			font-size: clamp(18px, 2.4vw, 24px);
			line-height: 1.45;
			color: var(--text-sub);
		}

		.games-grid {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 24px;
			align-items: stretch;
			margin-top: 20px;
		}

		.game-card {
			border: 1px solid var(--panel-border);
			background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)), var(--panel-bg);
			border-radius: 18px;
			padding: 22px;
			min-height: 330px;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			gap: 18px;
			text-align: left;
			color: inherit;
			transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
			position: relative;
			overflow: hidden;
		}

		.game-card::before {
			content: "";
			position: absolute;
			inset: 0;
			background: radial-gradient(circle at top right, rgba(155,92,255,0.2), transparent 38%);
			pointer-events: none;
		}

		.game-card:hover,
		.game-card:focus-visible {
			transform: translateY(-5px);
			box-shadow: var(--shadow-soft);
			border-color: rgba(255,255,255,0.22);
			outline: none;
		}

		.game-card:focus-visible {
			box-shadow: var(--shadow-soft), 0 0 0 3px var(--focus-ring);
		}

		.game-card.active {
			cursor: pointer;
		}

		.game-card.disabled {
			opacity: 0.58;
			cursor: not-allowed;
		}

		.card-copy {
			position: relative;
			z-index: 1;
		}

		.card-kicker {
			margin: 0 0 8px;
			font-size: 12px;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--accent-strong);
		}

		.card-title {
			margin: 0;
			font-family: 'Syne', sans-serif;
			font-size: clamp(34px, 4vw, 48px);
			line-height: 1.02;
			letter-spacing: -0.03em;
		}

		.card-text {
			margin: 12px 0 0;
			font-size: 16px;
			line-height: 1.6;
			color: var(--text-sub);
			max-width: 24ch;
		}

		.card-foot {
			position: relative;
			z-index: 1;
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			font-size: 12px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			color: #dce2f1;
		}

		.card-pill {
			padding: 8px 10px;
			border-radius: 999px;
			background: rgba(255,255,255,0.06);
			border: 1px solid rgba(255,255,255,0.1);
		}

		.card-art {
			position: relative;
			z-index: 1;
			min-height: 160px;
			border-radius: 14px;
			border: 1px solid rgba(255,255,255,0.12);
			background:
				repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 20px),
				repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 20px),
				linear-gradient(180deg, rgba(22,28,40,0.92), rgba(16,20,30,0.96));
			overflow: hidden;
		}

		.memory-art {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 8px;
			padding: 14px;
			align-content: center;
			height: 100%;
		}

		.memory-swatch {
			aspect-ratio: 1;
			border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.14);
		}

		.coming-soon-art {
			display: grid;
			place-items: center;
			font-family: 'Syne', sans-serif;
			font-size: 28px;
			letter-spacing: 0.08em;
			color: rgba(255,255,255,0.7);
		}

		.footer-note {
			margin: 24px 0 0;
			text-align: center;
			color: var(--text-sub);
			font-size: 15px;
		}

		@media (max-width: 980px) {
			.games-grid {
				grid-template-columns: 1fr;
			}

			.game-card {
				min-height: 280px;
			}
		}
	</style>
	<link rel="stylesheet" href="assets/mira-theme.css" />
</head>
<body>
	<main class="page-shell">
		<header class="topbar">
			<button class="back-button" id="backButton" type="button" aria-label="Go back">
				<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
					<path d="M15.5 5.5L9 12l6.5 6.5" />
				</svg>
			</button>
		</header>

		<section class="hero" aria-label="Games heading">
			<h1>Games</h1>
			<p>Choose a game! </p>
		</section>

		<section class="games-grid" aria-label="Available games">
			<button class="game-card active" id="memoryGameCard" type="button" aria-label="Start Memory game">
				<div class="card-copy">
					<p class="card-kicker">Game 1</p>
					<h2 class="card-title">Memory</h2>
					<p class="card-text">Memorize and rebuild it!</p>
				</div>
				<div class="card-art" aria-hidden="true">
					<div class="memory-art">
						<div class="memory-swatch" style="background:#22c55e"></div>
						<div class="memory-swatch" style="background:#9b5cff"></div>
						<div class="memory-swatch" style="background:#ef4444"></div>
						<div class="memory-swatch" style="background:#f59e0b"></div>
						<div class="memory-swatch" style="background:#26a6b5"></div>
						<div class="memory-swatch" style="background:#ffffff"></div>
						<div class="memory-swatch" style="background:#1a1a1f"></div>
						<div class="memory-swatch" style="background:#d6c2ff"></div>
					</div>
				</div>
			</button>

			<button class="game-card active" id="patternGameCard" type="button" aria-label="Start Pattern game">
				<div class="card-copy">
					<p class="card-kicker">Game 2</p>
					<h2 class="card-title">Pattern</h2>
					<p class="card-text">Follow the pattern!</p>
				</div>
				<div class="card-art" aria-hidden="true">
					<div class="memory-art">
						<div class="memory-swatch" style="background:#22c55e"></div>
						<div class="memory-swatch" style="background:#9b5cff"></div>
						<div class="memory-swatch" style="background:#ef4444"></div>
						<div class="memory-swatch" style="background:#f59e0b"></div>
						<div class="memory-swatch" style="background:#26a6b5"></div>
						<div class="memory-swatch" style="background:#ffffff"></div>
						<div class="memory-swatch" style="background:#1a1a1f"></div>
						<div class="memory-swatch" style="background:#d6c2ff"></div>
					</div>
				</div>
			</button>


			<!-- <div class="game-card disabled" aria-disabled="true">
				<div class="card-copy">
					<p class="card-kicker">Coming soon</p>
					<h2 class="card-title">Pattern Recall</h2>
					<p class="card-text">Rebuild a target from memory with streak tracking and score feedback.</p>
				</div>
				<div class="card-art coming-soon-art" aria-hidden="true">Soon</div>
			</div> -->
		</section>

		<p class="footer-note">Pick Memory or Pattern to start a challenge mode.</p>
	</main>

	<script>
		const backButton = document.getElementById("backButton");
		const memoryGameCard = document.getElementById("memoryGameCard");
		const patternGameCard = document.getElementById("patternGameCard");

		backButton.addEventListener("click", () => {
			window.location.href = "index.html";
		});

		memoryGameCard.addEventListener("click", () => {
			window.location.href = "games/memory.html";
		});

		patternGameCard.addEventListener("click", () => {
			window.location.href = "games/pattern.html";
		});
	</script>
</body>
</html>
